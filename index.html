<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安の私房料理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fdf6ec;
            color: #5d4037;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍色外框 */
        }

        /* 讓卡片在手機上有更舒服的圓角 */
        .menu-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            background-color: #ffffff;
            border-radius: 2rem; /* 手機端稍微縮小圓角，比例更好看 */
        }

        @media (min-width: 768px) {
            .menu-card { border-radius: 3rem; }
        }

        .menu-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(183, 121, 31, 0.15);
        }

        /* 導覽列：手機端自動橫向滾動 */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox 隱藏捲軸 */
        }
        .nav-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari 隱藏捲軸 */

        .tab-active { 
            background-color: #d97706;
            color: white !important; 
            border-color: #d97706; 
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        #lightbox.visible { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-amber-900">

    <div id="lightbox" class="fixed inset-0 bg-stone-900/95 z-50 hidden justify-center items-center p-4 cursor-zoom-out" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-amber-50 text-4xl font-light">&times;</button>
        <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl object-contain transition-transform duration-300 scale-95">
    </div>

    <header class="py-10 md:py-14 text-center bg-[#fffcf8] shadow-sm mb-4 border-b border-orange-100">
        <h1 class="text-3xl md:text-4xl font-black text-orange-900 tracking-widest uppercase">安の私房料理</h1>
        <div class="mt-3 flex justify-center items-center gap-3">
            <span class="h-[1.5px] w-8 bg-orange-200"></span>
            <p class="text-orange-800/70 font-bold tracking-widest text-xs md:text-sm">HOME KITCHEN MENU</p>
            <span class="h-[1.5px] w-8 bg-orange-200"></span>
        </div>
    </header>

    <nav class="sticky top-0 z-10 bg-[#fdf6ec]/90 backdrop-blur-md border-b border-orange-50/50">
        <div class="nav-scroll gap-3 px-4 py-4 md:justify-center md:gap-6" id="category-tabs">
            <button onclick="filterMenu('全部')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all tab-active">全部</button>
            <button onclick="filterMenu('主食')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">主食</button>
            <button onclick="filterMenu('肉類')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">肉類</button>
            <button onclick="filterMenu('蔬菜')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">蔬菜</button>
            <button onclick="filterMenu('蛋類')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">蛋類</button>
            <button onclick="filterMenu('涼拌小菜')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">涼拌小菜</button>
            <button onclick="filterMenu('湯')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">湯</button>
            <button onclick="filterMenu('點心')" class="tab-btn px-6 py-2 rounded-xl border-2 border-orange-100 font-bold text-orange-800 transition-all">點心</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6 min-h-[60vh]">
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
            </div>
    </main>

    <footer class="py-16 text-center">
        <div class="inline-block px-8 py-6 rounded-3xl bg-orange-50 mb-4">
            <p class="text-orange-900/40 text-xs tracking-widest mb-1 uppercase italic">Homemade with love</p>
            <p class="font-black text-orange-700 text-xl italic tracking-tighter">" 不好吃退錢 "</p>
        </div>
        <p class="text-orange-900/30 text-[10px] mt-4">© 2026 安的專屬廚房</p>
    </footer>

    <script>
        const myMenu = [
    /* 主食 */    
        {
                name: "私藏油潑扯麵",
                category: "主食",
                desc: "手工揉製麵糰，現扯現下，搭配香辣油潑辣子，彈牙有勁。",
                image: "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&w=1200",
                tag: "🌶️ 帶勁"
            },
            {
                name: "精選白米飯",
                category: "主食",
                desc: "嚴選在地好米，精準水米比例，粒粒分明、香Q飽滿。",
                image: "https://images.unsplash.com/photo-1516684732162-798a0062be99?auto=format&fit=crop&w=1200",
                tag: "🍚 經典"
            },
    /* 肉類 */ 
            {
                name: "糖醋排骨",
                category: "肉類",
                desc: "選用高品質排骨，特製醬汁慢燉，入口即化，肉食控首選。",
                image: "images/Meats/糖醋排骨.png",
                tag: "🔥 必點"
            },
            {
                name: "蒲燒虱目魚",
                category: "肉類",
                desc: "細緻虱目魚，秘製鹹甜蒲燒醬汁，鮮美無刺。",
                image: "images/Meats/蒲燒虱目魚.png",
                tag: "🐟 鮮甜"
            },
            {
                name: "鹹酥雞",
                category: "肉類",
                desc: "精選雞胸肉。",
                image: "images/Meats/鹹酥雞.png",
                tag: "🍗 鹹香"
            },
            {
                name: "BBBQ烤雞",
                category: "肉類",
                desc: "精選雞胸肉。",
                image: "images/Meats/BBQ烤雞.png",
                tag: "🍗 鹹香"
            },
            {
                name: "牛排",
                category: "肉類",
                desc: "精選雞胸肉。",
                image: "images/Meats/牛排.png",
                tag: "🍖 好吃"
            },
            {
                name: "番茄紅燒牛",
                category: "肉類",
                desc: "精選番茄、牛肉、馬鈴薯。",
                image: "images/Meats/番茄紅燒牛.png",
                tag: "🍖 好吃"
            },
    /* 蔬菜 */ 
            {
                name: "蒜香炒時蔬",
                category: "蔬菜",
                desc: "選用當季翠綠蔬菜，大火快炒鎖住水分，清甜爽口。",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200",
                tag: "🥬 新鮮"
            },
    /* 蛋類 */ 
            {
                name: "水煮蛋",
                category: "蛋類",
                desc: "選用雞蛋。",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200",
                tag: "🍳 新鮮"
            },
            {
                name: "蒸蛋",
                category: "蛋類",
                desc: "選用雞蛋。",
                image: "images/Eggs/蒸蛋.png",
                tag: "🍳 新鮮"
            },
            {
                name: "溫泉蛋",
                category: "蛋類",
                desc: "選用雞蛋。",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200",
                tag: "🍳 新鮮"
            },
            {
                name: "歐姆蛋",
                category: "蛋類",
                desc: "選用雞蛋。",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200",
                tag: "🍳 新鮮"
            },
            {
                name: "蛋捲",
                category: "蛋類",
                desc: "選用雞蛋。",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=1200",
                tag: "🍳 新鮮"
            },
    /* 涼拌小菜 */
            {
                name: "小黃瓜",
                category: "涼拌小菜",
                desc: "選用新鮮黃瓜。",
                image: "images/Cold dish/涼拌小黃瓜.png",
                tag: "🥒 鮮甜"
            },
    /* 湯 */
            {
                name: "玉米濃湯",
                category: "湯",
                desc: "鮮甜好喝。",
                image: "images/Cold dish/涼拌小黃瓜.png",
                tag: "🥣 好喝"
            },        
    /* 點心 */ 
            {
                name: "焦糖烤布蕾",
                category: "點心",
                desc: "絲滑奶香內餡搭配現烤焦糖脆片，最甜蜜的收尾。",
                image: "https://images.unsplash.com/photo-1470124182917-cc6e71b22ecc?auto=format&fit=crop&w=1200",
                tag: "🍮 手作"
            }
        ];

        const menuGrid = document.getElementById('menu-grid');
        const buttons = document.querySelectorAll('.tab-btn');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function renderMenu(filter = '全部') {
            const filteredData = filter === '全部' ? myMenu : myMenu.filter(item => item.category === filter);

            menuGrid.innerHTML = filteredData.map(dish => `
                <div class="menu-card overflow-hidden border border-orange-100 flex flex-col shadow-sm">
                    <div class="relative cursor-pointer group overflow-hidden" onclick="openLightbox('${dish.image}')">
                        <img src="${dish.image}" alt="${dish.name}" class="w-full h-64 md:h-72 object-top object-cover transition-transform duration-1000 group-hover:scale-105">
                        <span class="absolute top-4 left-4 bg-white/95 backdrop-blur-md px-3 py-1 rounded-xl text-[10px] font-bold text-orange-900 shadow-sm border border-orange-50">
                            ${dish.category}
                        </span>
                    </div>
                    <div class="p-6 md:p-8 flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl md:text-2xl font-bold text-orange-900 tracking-tight">${dish.name}</h3>
                            <span class="text-[9px] font-black uppercase tracking-widest text-orange-600 bg-orange-100 px-2 py-1 rounded-lg">${dish.tag}</span>
                        </div>
                        <p class="text-orange-800/60 leading-relaxed text-sm font-medium line-clamp-2">${dish.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function openLightbox(url) {
            lightboxImg.src = url;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.add('hidden');
            lightbox.classList.remove('visible');
            document.body.style.overflow = '';
        }

        function filterMenu(category) {
            buttons.forEach(btn => {
                if(btn.innerText === category) btn.classList.add('tab-active');
                else btn.classList.remove('tab-active');
            });
            renderMenu(category);
        }

        renderMenu();
    </script>
</body>
</html>
